<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Diabetes</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 5px; text-align: center; }
        .positif { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .negatif { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Prediksi Diabetes</h2>
    <form action="/predict" method="POST">
        <div class="form-group">
            <label>Pregnancies (Jumlah Kehamilan):</label>
            <input type="number" name="Pregnancies" step="any" value="{{ input_data.Pregnancies if input_data else 0 }}" required>
        </div>
        <div class="form-group">
            <label>Glucose (Kadar Glukosa):</label>
            <input type="number" name="Glucose" step="any" value="{{ input_data.Glucose if input_data else 0 }}" required>
        </div>
        <div class="form-group">
            <label>Blood Pressure (Tekanan Darah):</label>
            <input type="number" name="BloodPressure" step="any" value="{{ input_data.BloodPressure if input_data else 0 }}" required>
        </div>
        <div class="form-group">
            <label>Skin Thickness (Ketebalan Kulit):</label>
            <input type="number" name="SkinThickness" step="any" value="{{ input_data.SkinThickness if input_data else 0 }}" required>
        </div>
        <div class="form-group">
            <label>Insulin:</label>
            <input type="number" name="Insulin" step="any" value="{{ input_data.Insulin if input_data else 0 }}" required>
        </div>
        <div class="form-group">
            <label>BMI (Indeks Massa Tubuh):</label>
            <input type="number" name="BMI" step="0.1" value="{{ input_data.BMI if input_data else 0.0 }}" required>
        </div>
        <div class="form-group">
            <label>Diabetes Pedigree Function:</label>
            <input type="number" name="DiabetesPedigreeFunction" step="0.001" value="{{ input_data.DiabetesPedigreeFunction if input_data else 0.000 }}" required>
        </div>
        <div class="form-group">
            <label>Age (Usia):</label>
            <input type="number" name="Age" value="{{ input_data.Age if input_data else 0 }}" required>
        </div>
        <button type="submit">Cek Hasil Prediksi</button>
    </form>

    {% if hasil_dt and hasil_svc %}
    <div class="result-box {{ 'positif' if 'Positif' in hasil_dt else 'negatif' }}">
        <h3>Hasil Analisis Model:</h3>
        <p><b>Model Decision Tree:</b> {{ hasil_dt }}</p>
        <p><b>Model SVM:</b> {{ hasil_svc }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
